<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRP Delta Nord Afrique - SOMACA</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
    .container { max-width: 1900px; margin: auto; }
        h1 { color: #1e3a8a; text-align: center; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 20px; font-size: 14px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .kpi-card { background: white; padding: 14px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .kpi-card h3 { font-size: 11px; color: #666; margin-bottom: 6px; text-transform: uppercase; }
    .kpi-card.value { font-size: 24px; font-weight: bold; color: #1e3a8a; }
    .kpi-card.alert { border-left: 4px solid #dc2626; }
    .kpi-card.alert.value { color: #dc2626; }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tab { padding: 10px 18px; background: white; border: none; border-radius: 8px 8px 0 0; cursor: pointer; font-weight: 600; font-size: 14px; }
    .tab.active { background: #1e3a8a; color: white; }

    .table-wrapper { background: white; padding: 18px; border-radius: 0 10px 10px 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .toolbar { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
    .btn { padding: 9px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-success { background: #16a34a; color: white; }
    .btn-warning { background: #f59e0b; color: white; }
    .btn-danger { background: #dc2626; color: white; }

    .scroll { overflow-x: auto; max-height: 650px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1e3a8a; color: white; padding: 8px; text-align: left; position: sticky; top: 0; z-index: 10; white-space: nowrap; }
        td { padding: 6px 8px; border-bottom: 1px solid #eee; white-space: nowrap; }
        tr:hover { background: #f9fafb; }
    .status { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 700; }
    .status-ok { background: #dcfce7; color: #166534; }
    .status-warning { background: #fef3c7; color: #92400e; }
    .status-danger { background: #fee2e2; color: #991b1b; }
        input[type="file"] { display: none; }
    .hidden { display: none; }
    .alert-box { background: #fee2e2; border: 1px solid #dc2626; color: #991b1b; padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .success-box { background: #dcfce7; border: 1px solid #16a34a; color: #166534; padding: 10px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MRP Delta Nord Afrique - SOMACA</h1>
        <p class="subtitle">Forecast PF → Explosion BOM → Plan Rupture MP/C</p>

        <div id="alert-zone"></div>

        <div class="kpi-grid">
            <div class="kpi-card">
                <h3>Semaines Planifiées</h3>
                <div class="value" id="kpi-semaines">0</div>
            </div>
            <div class="kpi-card">
                <h3>NB PF</h3>
                <div class="value" id="kpi-pf">0</div>
            </div>
            <div class="kpi-card">
                <h3>NB MP</h3>
                <div class="value" id="kpi-mp">0</div>
            </div>
            <div class="kpi-card">
                <h3>NB C</h3>
                <div class="value" id="kpi-c">0</div>
            </div>
            <div class="kpi-card alert">
                <h3>Ruptures < 2 Sem</h3>
                <div class="value" id="kpi-rupture">0</div>
            </div>
            <div class="kpi-card alert">
                <h3>Val Manquante</h3>
                <div class="value" id="kpi-valeur">0 DH</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('besoin')">📦 Plan Besoin MP/C</button>
            <button class="tab" onclick="switchTab('rupture')">⚠️ Ruptures Critiques</button>
            <button class="tab" onclick="switchTab('forecast')">📊 Forecast PF</button>
            <button class="tab" onclick="switchTab('bom')">📋 Nomenclature</button>
            <button class="tab" onclick="switchTab('stock')">📦 Stock Actuel</button>
        </div>

        <div class="table-wrapper">
            <div class="toolbar">
                <div>
                    <label for="file-forecast" class="btn btn-success">📊 1. Import Forecast</label>
                    <input type="file" id="file-forecast" accept=".xlsx,.xls">
                    <label for="file-data" class="btn btn-warning">📋 2. Import Data MP/C</label>
                    <input type="file" id="file-data" accept=".xlsx,.xls">
                    <button class="btn btn-primary" onclick="calculerMRP()">⚡ 3. Calculer MRP</button>
                </div>
                <div>
                    <button class="btn btn-primary" onclick="exportExcel()">💾 Export Excel</button>
                    <button class="btn btn-danger" onclick="clearAll()">🗑️ Reset</button>
                </div>
            </div>

            <div id="table-besoin" class="scroll"><table id="besoin-table"></table></div>
            <div id="table-rupture" class="hidden scroll"><table id="rupture-table"></table></div>
            <div id="table-forecast" class="hidden scroll"><table id="forecast-table"></table></div>
            <div id="table-bom" class="hidden scroll"><table id="bom-table"></table></div>
            <div id="table-stock" class="hidden scroll"><table id="stock-table"></table></div>
        </div>
    </div>

    <script>
        let forecastPF = [];
        let bom = [];
        let stockMP = {};
        let besoinMP = {};
        let semaines = [];
        let currentTab = 'besoin';

        // Load saved
        const saved = localStorage.getItem('mrpDeltaSOMACA');
        if(saved) {
            const d = JSON.parse(saved);
            forecastPF = d.forecastPF || [];
            bom = d.bom || [];
            stockMP = d.stockMP || {};
            besoinMP = d.besoinMP || {};
            semaines = d.semaines || [];
            if(forecastPF.length > 0) renderAll();
        }

        function saveData() {
            localStorage.setItem('mrpDeltaSOMACA', JSON.stringify({forecastPF, bom, stockMP, besoinMP, semaines}));
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            ['besoin','rupture','forecast','bom','stock'].forEach(t => document.getElementById('table-'+t).classList.add('hidden'));
            document.getElementById('table-' + tab).classList.remove('hidden');
            renderTable();
        }

        // Import Forecast
        document.getElementById('file-forecast').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, {type:'binary'});
                const ws = wb.Sheets['TOTAL'];
                const json = XLSX.utils.sheet_to_json(ws);

                forecastPF = json;
                semaines = Object.keys(json[0]||{}).filter(k => k!== 'Reference' && k.match(/202\dS\d+/));

                showAlert(`✅ Forecast: ${forecastPF.length} PF, ${semaines.length} semaines`, 'success');
                renderAll(); saveData();
            };
            reader.readAsBinaryString(file);
        });

        // Import Data MP/C - 2 sheets
        document.getElementById('file-data').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const wb = XLSX.read(evt.target.result, {type:'binary'});

                // Sheet 1: BOM
                const wsBom = wb.Sheets['consumation MP et C'];
                bom = XLSX.utils.sheet_to_json(wsBom);

                // Sheet 2: Stock
                const wsStock = wb.Sheets['Stock MP et C'];
                const stockData = XLSX.utils.sheet_to_json(wsStock);
                stockMP = {};
                stockData.forEach(s => {
                    const code = (s['CODE ']||'').toString().trim();
                    if(code) {
                        stockMP[code] = {
                            code: code,
                            type: s['Type composant'] || '',
                            des: s['Désignation'] || '',
                            unite: s['Unité'] || '',
                            stock: parseFloat(s['Total']) || 0,
                            cond: parseFloat(s['Conditionnement']) || 0,
                            qte: parseFloat(s['quantité']) || 0
                        };
                    }
                });

                showAlert(`✅ Data: ${bom.length} lignes BOM, ${Object.keys(stockMP).length} réf stock`, 'success');
                renderAll(); saveData();
            };
            reader.readAsBinaryString(file);
        });

        // MRP Calculation
        function calculerMRP() {
            if(forecastPF.length === 0 || bom.length === 0) {
                showAlert('⚠️ Import les 2 fichiers lowel!', 'alert');
                return;
            }

            besoinMP = {};

            // Explosion BOM
            forecastPF.forEach(pf => {
                const pfRef = (pf['Reference']||'').toString().trim();

                const lignesBOM = bom.filter(b => (b['Reference ']||'').toString().trim() === pfRef);

                lignesBOM.forEach(ligne => {
                    const refMP = (ligne['composant ']||'').toString().trim();
                    const qte = parseFloat(ligne['Quantité']) || 0;

                    if(!refMP) return;

                    if(!besoinMP[refMP]) {
                        const stockInfo = stockMP[refMP] || {};
                        besoinMP[refMP] = {
                            ref: refMP,
                            des: ligne['Type Composant'] || stockInfo.des || '',
                            type: stockInfo.type || 'MP',
                            unite: ligne['Unité'] || stockInfo.unite || '',
                            stock: stockInfo.stock || 0,
                            besoin: {},
                            conso_moy: 0,
                            couverture: 999,
                            manque: 0,
                            statut: 'OK'
                        };
                        semaines.forEach(s => besoinMP[refMP].besoin[s] = 0);
                    }

                    semaines.forEach(s => {
                        const besoinPF = parseFloat(pf[s]) || 0;
                        besoinMP[refMP].besoin[s] += besoinPF * qte;
                    });
                });
            });

            // Calcul couverture
            Object.values(besoinMP).forEach(mp => {
                const totalBesoin = semaines.reduce((sum,s) => sum + mp.besoin[s], 0);
                mp.conso_moy = totalBesoin / semaines.length;
                mp.couverture = mp.conso_moy > 0? (mp.stock / mp.conso_moy) : 999;
                mp.manque = Math.max(0, (mp.conso_moy * 4) - mp.stock);

                if(mp.stock === 0 && totalBesoin > 0) mp.statut = 'RUPTURE';
                else if(mp.couverture < 2) mp.statut = 'CRITIQUE';
                else if(mp.couverture < 4) mp.statut = 'ALERTE';
                else mp.statut = 'OK';
            });

            updateKPI();
            renderAll();
            saveData();
            switchTab('besoin');

            const ruptures = Object.values(besoinMP).filter(m => m.statut === 'RUPTURE' || m.statut === 'CRITIQUE').length;
            showAlert(`⚡ MRP Calculé: ${Object.keys(besoinMP).length} MP/C, ${ruptures} critiques`, ruptures > 0? '
